<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#gradient)"/>
  
  <!-- Dumbbell Icon -->
  <g transform="translate(128, 180)">
    <!-- Left weight -->
    <rect x="0" y="20" width="40" height="80" rx="8" fill="white"/>
    <rect x="10" y="10" width="20" height="100" rx="4" fill="white" opacity="0.8"/>
    
    <!-- Bar -->
    <rect x="40" y="50" width="176" height="20" rx="10" fill="white"/>
    
    <!-- Right weight -->
    <rect x="216" y="20" width="40" height="80" rx="8" fill="white"/>
    <rect x="226" y="10" width="20" height="100" rx="4" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Letter F -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="white" text-anchor="middle">F</text>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
